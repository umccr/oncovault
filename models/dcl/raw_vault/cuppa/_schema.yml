version: 2
models:
  - name: sat_cuppa_predsum
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: sample_id
        data_type: varchar
      - name: clf_group
        data_type: varchar
      - name: clf_name
        data_type: varchar
      - name: rank
        data_type: bigint
      - name: class
        data_type: varchar
      - name: prob
        data_type: double
      - name: extra_info
        data_type: varchar
      - name: extra_info_format
        data_type: varchar

  - name: sat_cuppa_visdata
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: sample_id
        data_type: varchar
      - name: data_type
        data_type: varchar
      - name: clf_group
        data_type: varchar
      - name: clf_name
        data_type: varchar
      - name: feat_name
        data_type: varchar
      - name: feat_value
        data_type: double
      - name: cancer_type
        data_type: varchar
      - name: data_value
        data_type: double
      - name: rank
        data_type: double
      - name: rank_group
