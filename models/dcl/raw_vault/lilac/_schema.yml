version: 2
models:
  - name: sat_lilac_qc
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: status
        data_type: varchar
      - name: score_margin
        data_type: double
      - name: next_solution_alleles
        data_type: varchar
      - name: median_base_quality
        data_type: double
      - name: hla_y_allele
        data_type: varchar
      - name: discarded_indels
        data_type: double
      - name: discarded_indel_max_frags
        data_type: double
      - name: discarded_alignment_fragments
        data_type: double
      - name: a_low_coverage_bases
        data_type: double
      - name: b_low_coverage_bases
        data_type: double
      - name: c_low_coverage_bases
        data_type: double
      - name: a_types
        data_type: double
      - name: b_types
        data_type: double
      - name: c_types
        data_type: double
      - name: total_fragments
        data_type: double
      - name: fitted_fragments
        data_type: double
      - name: unmatched_fragments
        data_type: double
      - name: uninformative_fragments
        data_type: double
      - name: hla_y_fragments
        data_type: double
      - name: percent_unique
        data_type: double
      - name: percent_shared
        data_type: double
      - name: percent_wildcard
        data_type: double
      - name: unused_amino_acids
        data_type: double
      - name: unused_amino_acid_max_frags
        data_type: double
      - name: unused_haplotypes
        data_type: double
      - name: unused_haplotype_max_frags
        data_type: double
      - name: somatic_variants_matched
        data_type: double
      - name: somatic_variants_unmatched
        data_type: double

  - name: sat_lilac_summary
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: allele
        data_type: varchar
      - name: ref_total
        data_type: double
      - name: ref_unique
        data_type: double
      - name: ref_shared
