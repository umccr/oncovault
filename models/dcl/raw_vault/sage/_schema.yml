version: 2
models:
  - name: sat_sage_bqrtsv
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: alt
        data_type: varchar
      - name: ref
        data_type: varchar
      - name: context
        data_type: varchar
      - name: read_type
        data_type: varchar
      - name: count
        data_type: double
      - name: origq
        data_type: double
      - name: recalq
        data_type: double
