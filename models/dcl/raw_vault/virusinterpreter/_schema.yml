version: 2
models:
  - name: sat_virusinterpreter_annotated
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - library_workflow_run_hk
              - load_date
              - hash_diff
    columns:
      - name: library_workflow_run_hk
        data_type: varchar(64)
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('link_library_workflow_run')
                field: library_workflow_run_hk
      - name: load_date
        data_type: date
      - name: hash_diff
        data_type: varchar(64)
      - name: record_source
        data_type: varchar(255)
      - name: last_seen_datetime
        data_type: timestamp
      - name: batch_id
        data_type: varchar(26)
      - name: batch_date
        data_type: date
      - name: taxid
        data_type: varchar
      - name: name
        data_type: varchar
      - name: qc_status
        data_type: varchar
      - name: integrations
        data_type: double
      - name: interpretation
        data_type: varchar
      - name: percentage_covered
        data_type: double
      - name: mean_coverage
        data_type: double
      - name: expected_clonal_coverage
        data_type: varchar
      - name: reported
        data_type: varchar
      - name: blacklisted
        data_type: varchar
      - name: driver_likelihood
        data_type: varchar
