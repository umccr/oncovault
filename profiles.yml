oncovault:
  outputs:
    dev:
      type: athena
      aws_profile_name: "{{ env_var('AWS_PROFILE', default='unimelb-warehouse-prod-poweruser') }}"
      work_group: "{{ env_var('DBT_ENV_SECRET_WORK_GROUP') }}"
      s3_staging_dir: "{{ env_var('DBT_ENV_SECRET_S3_STAGING_DIR') }}"
      s3_data_dir: "{{ env_var('DBT_ENV_SECRET_S3_DATA_DIR') }}"
      s3_data_naming: "{{ env_var('DBT_ENV_SECRET_S3_DATA_NAMING') }}"
      s3_tmp_table_dir: "{{ env_var('DBT_ENV_SECRET_S3_TMP_TABLE_DIR') }}"
      region_name: "{{ env_var('DBT_ENV_SECRET_REGION_NAME') }}"
      database: awsdatacatalog
      schema: oncovault_dev
      threads: 4
      num_retries: 1
  target: dev
